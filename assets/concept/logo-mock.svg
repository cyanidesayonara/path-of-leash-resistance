<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Georgia, 'Times New Roman', serif">
  <!-- Logo composition mock v2: layout, light and spirit guide for the
       watercolor final. Millie sprints at the root of a leash spiral,
       the owner has achieved flight, Tofu supervises from the margin. -->
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f2e6"/>
      <stop offset="1" stop-color="#eee5d1"/>
    </linearGradient>
    <radialGradient id="wash1">
      <stop offset="0" stop-color="#b9d2d8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#b9d2d8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wash2">
      <stop offset="0" stop-color="#e9d3a4" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#e9d3a4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lampglow">
      <stop offset="0" stop-color="#f5d87a" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#f5d87a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="phoneglow">
      <stop offset="0" stop-color="#aacdf0" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#aacdf0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e5dcc4" stop-opacity="0"/>
      <stop offset="1" stop-color="#cdbf9d" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect width="900" height="500" fill="url(#paper)"/>
  <ellipse cx="230" cy="110" rx="260" ry="105" fill="url(#wash1)"/>
  <ellipse cx="640" cy="85" rx="290" ry="95" fill="url(#wash2)"/>
  <ellipse cx="460" cy="170" rx="360" ry="120" fill="url(#wash1)"/>
  <rect x="0" y="330" width="900" height="170" fill="url(#ground)"/>
  <g fill="#8a8270" opacity="0.14">
    <circle cx="120" cy="210" r="1.6"/><circle cx="310" cy="90" r="1.2"/><circle cx="530" cy="60" r="1.5"/>
    <circle cx="760" cy="150" r="1.3"/><circle cx="210" cy="300" r="1.4"/><circle cx="470" cy="250" r="1.2"/>
    <circle cx="840" cy="70" r="1.5"/><circle cx="60" cy="120" r="1.2"/><circle cx="660" cy="300" r="1.6"/>
  </g>

  <!-- lamppost with four bulbs and a warm glow -->
  <circle cx="625" cy="105" r="70" fill="url(#lampglow)"/>
  <rect x="618" y="100" width="14" height="272" rx="6" fill="#565349"/>
  <rect x="614" y="362" width="22" height="12" rx="4" fill="#47443c"/>
  <g fill="#f2d876">
    <circle cx="625" cy="92" r="9"/><circle cx="607" cy="102" r="6"/>
    <circle cx="643" cy="102" r="6"/><circle cx="625" cy="112" r="5"/>
  </g>

  <!-- the leash: layered spiral, then the whip out to the owner -->
  <path d="M 625 214 c 64 -14 80 54 8 60 c -90 8 -102 -80 8 -90 c 126 -12 148 102 -12 118 c -158 16 -180 -128 44 -140"
        fill="none" stroke="#8f2f20" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <path d="M 625 214 c 64 -14 80 54 8 60 c -90 8 -102 -80 8 -90 c 126 -12 148 102 -12 118 c -158 16 -180 -128 44 -140"
        fill="none" stroke="#c44a33" stroke-width="4" stroke-linecap="round"/>
  <path d="M 669 162 C 748 116 786 148 818 206" fill="none" stroke="#8f2f20" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <path d="M 669 162 C 748 116 786 148 818 206" fill="none" stroke="#c44a33" stroke-width="4" stroke-linecap="round"/>
  <path d="M 500 250 a 130 130 0 0 1 40 -60" fill="none" stroke="#8a8270" stroke-width="2.5" opacity="0.4"/>
  <path d="M 486 282 a 150 150 0 0 1 20 -46" fill="none" stroke="#8a8270" stroke-width="2" opacity="0.3"/>

  <!-- the owner, airborne, phone held safe, one shoe already gone -->
  <circle cx="836" cy="176" r="34" fill="url(#phoneglow)"/>
  <g transform="translate(818 226) rotate(42)">
    <path d="M -24 30 Q -34 6 -22 -18 Q -10 -34 10 -30 Q 28 -24 26 0 Q 24 26 6 34 Q -12 40 -24 30 Z" fill="#46586e"/>
    <path d="M -26 26 q -10 10 -6 20 l 12 -10 Z" fill="#3a4a5e"/>
    <circle cx="6" cy="-44" r="16" fill="#e3bf98"/>
    <path d="M -10 -52 a 17 17 0 0 1 32 -6" fill="none" stroke="#4a3826" stroke-width="8" stroke-linecap="round"/>
    <line x1="12" y1="-36" x2="34" y2="-56" stroke="#e3bf98" stroke-width="7" stroke-linecap="round"/>
    <rect x="30" y="-70" width="16" height="27" rx="3" fill="#20242c"/>
    <rect x="33" y="-66" width="10" height="19" rx="2" fill="#9fc4e8"/>
    <line x1="-14" y1="26" x2="-34" y2="48" stroke="#3a4a5e" stroke-width="9" stroke-linecap="round"/>
    <line x1="8" y1="30" x2="16" y2="56" stroke="#3a4a5e" stroke-width="9" stroke-linecap="round"/>
    <ellipse cx="18" cy="62" rx="7" ry="4" fill="#e8e4da"/>
  </g>
  <g transform="translate(760 118) rotate(-30)">
    <path d="M 0 0 q 10 -4 18 0 l 2 6 q -10 4 -20 2 Z" fill="#2c2f36"/>
  </g>
  <text x="756" y="96" font-size="26" fill="#6a675e" font-style="italic" transform="rotate(-8 756 96)">aaaa!</text>

  <!-- Millie at full sprint: deep chest, tucked waist, ear flying -->
  <g transform="translate(492 322)">
    <ellipse cx="6" cy="30" rx="52" ry="8" fill="#8a8270" opacity="0.2"/>
    <path d="M -62 -4 Q -50 -14 -36 -14 L 30 -18 Q 46 -16 50 -6 Q 52 4 42 8 L -30 10 Q -50 10 -62 -4 Z" fill="#23211f"/>
    <circle cx="-52" cy="-12" r="15" fill="#23211f"/>
    <path d="M -64 -18 Q -78 -20 -84 -14 Q -76 -8 -66 -8 Z" fill="#35322e"/>
    <circle cx="-82" cy="-13" r="3.5" fill="#121110"/>
    <path d="M -50 -26 Q -58 -42 -46 -46 Q -42 -34 -44 -26 Z" fill="#151312"/>
    <path d="M 46 -10 Q 72 -22 80 -44" fill="none" stroke="#23211f" stroke-width="6" stroke-linecap="round"/>
    <path d="M -36 6 L -56 22 L -62 18" fill="none" stroke="#23211f" stroke-width="7" stroke-linecap="round"/>
    <path d="M 36 6 L 58 20 L 64 16" fill="none" stroke="#23211f" stroke-width="7" stroke-linecap="round"/>
    <path d="M -22 8 L -30 26" fill="none" stroke="#151312" stroke-width="6" stroke-linecap="round"/>
    <path d="M 24 8 L 34 24" fill="none" stroke="#151312" stroke-width="6" stroke-linecap="round"/>
    <circle cx="-62" cy="20" r="3.4" fill="#c9c5be"/>
    <circle cx="64" cy="18" r="3.4" fill="#c9c5be"/>
    <circle cx="-31" cy="27" r="3" fill="#c9c5be"/>
    <circle cx="35" cy="25" r="3" fill="#c9c5be"/>
    <rect x="-26" y="-22" width="34" height="13" rx="6" fill="#b8402e"/>
    <path d="M -9 -22 L -9 -9" stroke="#8f2f20" stroke-width="2"/>
    <ellipse cx="-56" cy="-16" rx="6" ry="4" fill="#8f8b84" opacity="0.7"/>
    <path d="M -96 -2 h 14 M -100 6 h 12 M -94 -10 h 10" stroke="#8a8270" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Tofu, sitting at a respectful distance, tail curled -->
  <g transform="translate(856 396)">
    <path d="M 20 8 q 18 -2 16 -22 q -1 -8 -6 -10" fill="none" stroke="#a3764e" stroke-width="6" stroke-linecap="round"/>
    <path d="M -2 12 Q -22 12 -24 -4 Q -25 -16 -14 -18 L 8 -16 Q 22 -12 20 2 Q 18 12 -2 12 Z" fill="#f2efe9"/>
    <path d="M -14 -16 Q -2 -22 8 -15 L 6 -6 L -12 -8 Z" fill="#a3764e"/>
    <circle cx="-20" cy="-14" r="10" fill="#f2efe9"/>
    <path d="M -28 -20 l -3 -9 l 8 4 Z" fill="#a3764e"/>
    <path d="M -17 -22 l 1 -9 l 6 6 Z" fill="#a3764e"/>
    <path d="M -26 -20 Q -20 -24 -14 -20 L -15 -13 L -25 -14 Z" fill="#a3764e"/>
    <circle cx="-24" cy="-13" r="1.4" fill="#3a352e"/>
    <path d="M -10 -4 q 10 6 20 4" fill="none" stroke="#d9749c" stroke-width="4"/>
  </g>

  <!-- grass tufts and a pawprint trail into the title -->
  <g stroke="#5d7a4c" stroke-width="4" stroke-linecap="round" opacity="0.85">
    <path d="M 90 372 q 4 -22 -4 -34 M 100 372 q 0 -16 6 -24"/>
    <path d="M 300 376 q 6 -20 -2 -30 M 310 376 q 2 -14 8 -20"/>
    <path d="M 560 374 q -4 -18 6 -28"/><path d="M 700 376 q 4 -20 -4 -30"/>
    <path d="M 820 372 q -2 -18 8 -26 M 830 372 q 2 -12 -2 -20"/>
  </g>
  <g fill="#8a8270" opacity="0.45">
    <ellipse cx="180" cy="384" rx="5" ry="4"/><circle cx="176" cy="378" r="1.6"/><circle cx="181" cy="377" r="1.6"/><circle cx="186" cy="379" r="1.6"/>
    <ellipse cx="230" cy="392" rx="5" ry="4"/><circle cx="226" cy="386" r="1.6"/><circle cx="231" cy="385" r="1.6"/><circle cx="236" cy="387" r="1.6"/>
    <ellipse cx="285" cy="386" rx="5" ry="4"/><circle cx="281" cy="380" r="1.6"/><circle cx="286" cy="379" r="1.6"/><circle cx="291" cy="381" r="1.6"/>
  </g>

  <!-- title with soft shadow; the leash underline ends in a collar ring -->
  <text x="83" y="431" font-size="58" fill="#8a8270" opacity="0.35" letter-spacing="2" font-weight="bold">PATH OF LEASH</text>
  <text x="80" y="428" font-size="58" fill="#2c2a26" letter-spacing="2" font-weight="bold">PATH OF <tspan fill="#b8402e">LEASH</tspan></text>
  <text x="83" y="481" font-size="58" fill="#8a8270" opacity="0.35" letter-spacing="2" font-weight="bold">RESISTANCE</text>
  <text x="80" y="478" font-size="58" fill="#2c2a26" letter-spacing="2" font-weight="bold">RESISTANCE</text>
  <path d="M 480 462 q 160 26 330 -6" fill="none" stroke="#8f2f20" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <path d="M 480 462 q 160 26 330 -6" fill="none" stroke="#c44a33" stroke-width="4" stroke-linecap="round"/>
  <circle cx="822" cy="452" r="10" fill="none" stroke="#c44a33" stroke-width="6"/>
  <text x="620" y="496" font-size="19" fill="#6a675e" font-style="italic">you are the dog. go touch grass.</text>
</svg>
